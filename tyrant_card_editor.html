<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyrant Unleashed Card Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#1a1a1a;color:#e0e0e0}
.layout{display:grid;grid-template-columns:240px 1fr;gap:12px;padding:12px;min-height:100vh}
.left{display:flex;flex-direction:column;gap:10px}
.panel{background:#242424;border:1px solid #3a3a3a;border-radius:8px;padding:10px}
.panel-title{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.card-wrap{display:flex;justify-content:center;padding:4px}
.card{width:180px;border-radius:8px;padding:3px;box-shadow:0 4px 16px rgba(0,0,0,.7)}
.card-inner{border-radius:6px;overflow:hidden;display:flex;flex-direction:column}
.card-header{padding:4px 5px 3px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.card-title{font-size:9px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-shadow:0 1px 3px #000}
.cost-badge{width:20px;height:20px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.card-img-area{width:100%;height:130px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.card-img-area img.card-art{width:100%;height:100%;object-fit:cover;display:none}
.card-img-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:rgba(255,255,255,.3);font-size:9px;width:100%;height:100%}
.card-faction-bar{font-size:8px;color:rgba(255,255,255,.65);padding:2px 5px;font-style:italic}
.card-skills-area{padding:3px 5px;min-height:20px}
.card-skill-line{font-size:8px;color:#4ef542;line-height:1.4;display:flex;align-items:baseline;gap:3px}
.card-skill-line::before{content:"◆";font-size:6px;flex-shrink:0;opacity:.7}
.card-stats-bar{display:flex;align-items:center;justify-content:space-between;padding:3px 5px 4px}
.stat{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700}
.stat img{width:14px;height:14px;image-rendering:pixelated}
.stat.atk{color:#f4c066}.stat.hp{color:#7de87d}
.rarity-name-tiny{font-size:7px;color:rgba(255,255,255,.4);text-align:center;line-height:1}
.r1{background:linear-gradient(145deg,#6b4e12,#c8a850,#6b4e12)}.r1 .card-inner{background:#1e1608}.r1 .card-header{background:linear-gradient(180deg,#5a3e0e,#2a1e06)}.r1 .cost-badge{border:1.5px solid #c8a850;color:#c8a850}
.r2{background:linear-gradient(145deg,#0d3a7a,#3a7fd4,#0d3a7a)}.r2 .card-inner{background:#080e1a}.r2 .card-header{background:linear-gradient(180deg,#0d2a5a,#08101e)}.r2 .cost-badge{border:1.5px solid #3a7fd4;color:#7abcf4}
.r3{background:linear-gradient(145deg,#7a6000,#e8c000,#7a6000)}.r3 .card-inner{background:#1a1500}.r3 .card-header{background:linear-gradient(180deg,#5a4400,#1a1000)}.r3 .cost-badge{border:1.5px solid #e8c000;color:#e8c000}
.r4{background:linear-gradient(145deg,#5a0090,#b040f0,#5a0090)}.r4 .card-inner{background:#130010}.r4 .card-header{background:linear-gradient(180deg,#440070,#100008)}.r4 .cost-badge{border:1.5px solid #c060f8;color:#c060f8}
.r5{background:linear-gradient(145deg,#004a40,#00c4a0,#004a40)}.r5 .card-inner{background:#001a14}.r5 .card-header{background:linear-gradient(180deg,#003a2e,#001410)}.r5 .cost-badge{border:1.5px solid #00c4a0;color:#40e4c0}
.r6{background:linear-gradient(145deg,#004070,#00a8d8,#004070)}.r6 .card-inner{background:#000d1a}.r6 .card-header{background:linear-gradient(180deg,#003060,#000810)}.r6 .cost-badge{border:1.5px solid #00a8d8;color:#40c8f8}
.xml-box{background:#111;border:1px solid #3a3a3a;border-radius:6px;padding:8px;font-family:monospace;font-size:10px;color:#a8d8a8;white-space:pre;overflow-x:auto;max-height:260px;overflow-y:auto;line-height:1.5}
.editor{background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:12px;overflow-y:auto;max-height:calc(100vh - 24px)}
.sec{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;padding-top:8px;border-top:1px solid #333}
.sec.notop{margin-top:0;padding-top:0;border-top:none}
.tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.tab{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid #444;background:#2a2a2a;color:#888;cursor:pointer}
.tab:hover{background:#333;color:#bbb}
.tab.active{background:#1a3a6a;color:#7abcf4;border-color:#3a7fd4}
.tab.lvl-active{background:#1a4a1a;color:#7de87d;border-color:#3a8a3a}
.tab.warn{border-color:#c06000!important;color:#f09040!important}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.field label{font-size:11px;color:#888}
.field input,.field select{background:#2a2a2a;border:1px solid #444;border-radius:5px;color:#e0e0e0;font-size:12px;padding:4px 7px;width:100%;outline:none}
.num-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.num-row .lbl{font-size:11px;color:#888;min-width:56px;display:flex;align-items:center;gap:4px}
.num-row .lbl img{width:14px;height:14px;image-rendering:pixelated}
.nc{display:flex;align-items:center;gap:3px}
.nc button{width:22px;height:22px;background:#333;border:1px solid #555;color:#ccc;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.nc button:hover{background:#444}
.nc .val{min-width:26px;text-align:center;font-size:12px;font-weight:600;color:#e0e0e0}
.nc input.val{background:transparent;border:none;outline:none;width:32px;text-align:center;font-size:12px;font-weight:600;color:#e0e0e0;font-family:inherit;padding:0;-moz-appearance:textfield;}
.nc input.val::-webkit-outer-spin-button,.nc input.val::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.nc input.val.warn-val{color:#f09040}
.smsp{min-width:20px;text-align:center;font-size:11px;font-weight:600;color:#e0e0e0}
.nc .val.warn-val{color:#f09040}
.rarity-suf{font-size:11px;color:#888;margin-left:2px}
.warn-box{background:#2a1a00;border:1px solid #804000;border-radius:5px;padding:5px 8px;font-size:10px;color:#f09040;margin-bottom:8px;display:none;line-height:1.6}
.warn-box.show{display:block}
.const-box{background:#1a2a1a;border:1px solid #2a6a2a;border-radius:6px;padding:8px;margin-bottom:8px}
.const-box .sec{font-size:10px;margin:0 0 6px;padding:0;border:none;color:#4a8a4a}
.skill-card{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;padding:7px 8px;margin-bottom:5px}
.skill-card.lore-never{border-color:#8b0000}
.skill-card.lore-rare{border-color:#804000}
.skill-top{display:flex;gap:4px;align-items:center;margin-bottom:5px}
.skill-top select{flex:1;background:#222;border:1px solid #444;border-radius:4px;color:#e0e0e0;font-size:12px;padding:3px 5px}
.del-btn{width:22px;height:22px;background:#3a1a1a;border:1px solid #6a2a2a;color:#c06060;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.del-btn:hover{background:#4a2020}
.skill-attrs{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-top:4px}
.attr-wrap{display:flex;flex-direction:column;gap:2px}
.attr-lbl{font-size:9px;color:#666}
.smb{width:17px;height:17px;background:#333;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;padding:0}
.smb:hover{background:#444}
.smsp.warn-val{color:#f09040}
.nh{display:flex;align-items:center;gap:2px}
.tog{font-size:10px;padding:2px 8px;background:#2a2a2a;border:1px solid #555;color:#888;border-radius:4px;cursor:pointer;height:19px;white-space:nowrap;line-height:1}
.tog:hover{background:#333}
.tog.on{background:#1a3a6a;color:#7abcf4;border-color:#3a7fd4}
.sks{font-size:11px;height:20px;background:#222;border:1px solid #444;color:#e0e0e0;border-radius:4px;padding:0 3px;min-width:75px}
.trig-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;align-items:center}
.trig-lbl{font-size:9px;color:#555;white-space:nowrap}
.trig-btn{font-size:9px;padding:2px 7px;background:#2a2a2a;border:1px solid #444;color:#666;border-radius:4px;cursor:pointer;height:18px;line-height:1;white-space:nowrap}
.trig-btn:hover{background:#333;color:#aaa}
.trig-btn.on{background:#2a1060;color:#b080f8;border-color:#6040a0}
.add-skill-btn{width:100%;background:#2a2a2a;border:1px solid #444;border-radius:5px;color:#888;font-size:11px;padding:5px;cursor:pointer;margin-top:2px}
.add-skill-btn:hover{background:#333;color:#bbb}
.copy-btn{width:100%;background:#1a3a1a;border:1px solid #3a6a3a;border-radius:5px;color:#7de87d;font-size:11px;padding:5px;cursor:pointer;margin-top:6px}
.copy-btn:hover{background:#224a22}
.reset-btn{width:100%;background:#3a1a1a;border:1px solid #6a2a2a;border-radius:5px;color:#c07070;font-size:11px;padding:5px;cursor:pointer;margin-top:4px}
.reset-btn:hover{background:#4a2020;color:#e08080}
.pic-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.pic-row .lbl{font-size:11px;color:#888;min-width:66px}
.pic-row .pic-name{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ab-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.ab-row label{font-size:11px;color:#888;min-width:66px;flex-shrink:0}
.ab-val{font-size:11px;flex:1}
.inline-field{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.inline-field label{font-size:11px;color:#888;min-width:66px;flex-shrink:0}
.inline-field select{background:#2a2a2a;border:1px solid #444;border-radius:5px;color:#e0e0e0;font-size:12px;padding:4px 7px;flex:1;outline:none}
.dimmed{opacity:.35;pointer-events:none}
</style>
</head>
<body>

<div class="layout">
<div class="left">
  <div class="panel">
    <div class="panel-title">Preview</div>
    <div class="card-wrap">
      <div class="card r1" id="cardFrame" style="width:180px">
        <div class="card-inner">
          <div class="card-header">
            <img id="rarIc" style="width:14px;height:14px;image-rendering:pixelated;display:none" src="" alt="">
            <span class="card-title" id="pvName" style="color:rgba(255,255,255,.3);font-style:italic">New card…</span>
            <div class="cost-badge" id="pvCost">0</div>
          </div>
          <div class="card-img-area" onclick="document.getElementById('imgFile').click()">
            <img id="cardArt" class="card-art" src="" alt="">
            <div class="card-img-ph" id="cardPh">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              <span>click to upload</span>
            </div>
          </div>
          <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="loadImg(event)">
          <div style="display:none"><div id="rarIcStats"></div><div id="pvRarName"></div></div>
          <div class="card-faction-bar" id="pvFaction">Imperial</div>
          <div class="card-skills-area" id="pvSkills"></div>
          <div class="card-stats-bar">
            <div class="stat atk"><img src="" id="atkIcCard" alt=""><span id="pvAtk">0</span></div>
            <div class="stat hp"><span id="pvHp">0</span><img src="" id="hpIcCard" alt=""></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">XML output</div>
    <div class="xml-box" id="xmlOut"></div>
    <button class="copy-btn" onclick="copyXml()">⎘ Copy XML</button>
  </div>
</div>
<div class="editor">
  <div class="const-box">
    <div class="sec notop">Card-wide (all fusions &amp; levels)</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
      <div class="num-row" style="margin:0">
        <span class="lbl">Rarity</span>
        <div class="nc"><button onclick="adjShared('rarity',-1)">−</button><input type="number" class="val" id="shRarity" value="1" min="1" max="6" onchange="setShared('rarity',this)" oninput="filterInt(this)" onkeydown="blockNonInt(event)"><button onclick="adjShared('rarity',1)">+</button></div>
        <span class="rarity-suf" id="shRarityLabel">Common</span>
        <img id="rarIcEditor" style="width:14px;height:14px;image-rendering:pixelated;margin-left:4px;display:none" src="" alt="">
      </div>
      <div class="num-row" style="margin:0">
        <span class="lbl">Cost</span>
        <div class="nc"><button onclick="adjShared('cost',-1)">−</button><input type="number" class="val" id="shCost" value="0" min="0" onchange="setShared('cost',this)" oninput="filterInt(this)" onkeydown="blockNonInt(event)"><button onclick="adjShared('cost',1)">+</button></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:120px">
        <label style="font-size:11px;color:#4a8a4a;white-space:nowrap;min-width:44px">Faction</label>
        <select id="fType" onchange="saveBase()" style="background:#1a2a1a;border:1px solid #2a6a2a;border-radius:5px;color:#c0d8c0;font-size:12px;padding:3px 5px;flex:1;outline:none">
          <option value="1">Imperial</option><option value="2">Raider</option>
          <option value="3">Bloodthirsty</option><option value="4">Xeno</option>
          <option value="5">Righteous</option><option value="6">Progenitor</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:120px">
        <label style="font-size:11px;color:#4a8a4a;white-space:nowrap;min-width:44px">Card set</label>
        <select id="fSet" onchange="saveBase()" style="background:#1a2a1a;border:1px solid #2a6a2a;border-radius:5px;color:#c0d8c0;font-size:12px;padding:3px 5px;flex:1;outline:none">
          <option value="1000">Standard (1000)</option><option value="2000">Fusion (2000)</option>
          <option value="2500">Base Fusion (2500)</option><option value="3000">Box (3000)</option>
          <option value="3001">Box Alt (3001)</option><option value="4000">PVE Reward (4000)</option>
          <option value="4250">Mutant Reward (4250)</option><option value="4500">PVP Reward (4500)</option>
          <option value="4700">PVE Legacy (4700)</option><option value="4750">PVP Legacy (4750)</option>
          <option value="7000">Commander (7000)</option><option value="8500">Dominion (8500)</option>
          <option value="9000">Chance (9000)</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center">
      <label style="font-size:11px;color:#4a8a4a;white-space:nowrap;min-width:44px">Card type</label>
      <div id="cardTypeButtons" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      <div id="dominionBox" style="display:none;align-items:center;gap:5px;margin-left:4px">
        <input type="checkbox" id="isDominion" onchange="saveDominion()" style="cursor:pointer">
        <label for="isDominion" style="font-size:11px;color:#4a8a4a;cursor:pointer">Dominion</label>
      </div>
    </div>
  </div>
  <div class="sec notop" style="margin-top:4px">Fusion level</div>
  <div class="tabs" id="fusionTabs"></div>
  <div class="sec" style="margin-top:4px">Level</div>
  <div class="tabs" id="levelTabs"></div>
  <div id="warnBox" class="warn-box"></div>
  <div class="sec">Card identity</div>
  <div class="field"><label>Name</label><input type="text" id="fName" placeholder="Card name…" oninput="onNameChange()"></div>
  <div class="field"><label>ID</label><input type="text" id="fId" placeholder="e.g. 68292" oninput="saveId()"></div>
  <div class="pic-row">
    <span class="lbl">Image file</span>
    <span class="pic-name" id="pictureName" style="color:#555;font-style:italic">none</span>
    <button style="background:#2a2a2a;border:1px solid #444;border-radius:4px;color:#888;font-size:10px;padding:2px 8px;cursor:pointer" onclick="document.getElementById('imgFile').click()">Upload</button>
  </div>
  <div class="ab-row">
    <label>Asset bundle</label>
    <span class="ab-val" id="abVal" style="color:#555;font-style:italic">—</span>
  </div>
  <div class="sec">Stats — Lvl <span id="curLvlLbl">1</span></div>
  <div class="num-row" id="atkRow">
    <span class="lbl"><img src="" id="atkIcE" style="width:14px;height:14px;image-rendering:pixelated" alt=""> Atk</span>
    <div class="nc"><button onclick="adjLevel('attack',-1)">−</button><input type="number" class="val" id="fAtk" value="0" min="0" onchange="setLevel('attack',this)" oninput="filterInt(this)" onkeydown="blockNonInt(event)"><button onclick="adjLevel('attack',1)">+</button></div>
  </div>
  <div class="num-row">
    <span class="lbl"><img src="" id="hpIcE" style="width:14px;height:14px;image-rendering:pixelated" alt=""> HP</span>
    <div class="nc"><button onclick="adjLevel('health',-1)">−</button><input type="number" class="val" id="fHp" value="0" min="0" onchange="setLevel('health',this)" oninput="filterInt(this)" onkeydown="blockNonInt(event)"><button onclick="adjLevel('health',1)">+</button></div>
  </div>
  <div class="sec">Skills — Lvl <span id="curLvlLbl2">1</span></div>
  <div id="skillsContainer"></div>
  <button class="add-skill-btn" onclick="addSkill()">+ Add skill</button>
  <button class="add-skill-btn" id="copySkillsBtn" onclick="copySkillsToAllLevels()" style="margin-top:4px;color:#7abcf4;border-color:#3a6a9a">↓ Copy all skills to all levels (this fusion)</button>
  <button class="reset-btn" onclick="resetAll()">↺ Reset / New card</button>
</div>

</div>

function loreLevelForSkill(sid,fid){
  if(LORE_NEVER[sid]&&LORE_NEVER[sid].has(fid))return'never';
  if(LORE_WARN[sid]&&LORE_WARN[sid].has(fid))return'warn';
  return'ok';
}

function getWarnings(){
  const msgs=[],ci=curLevel;
  if(ci>0){
    const lv=gf().levels,prev=lv[ci-1],cur=lv[ci];
    if(cur.attack<prev.attack&&prev.attack>0)msgs.push(`⚠ Attack (${cur.attack}) < Lvl ${prev.level} (${prev.attack})`);
    if(cur.health<prev.health&&prev.health>0)msgs.push(`⚠ Health (${cur.health}) < Lvl ${prev.level} (${prev.health})`);
    prev.skills.forEach((psk,si)=>{
      const csk=cur.skills[si];if(!csk||csk.id!==psk.id)return;
      const pv=psk.x||psk.n||0,cv=csk.x||csk.n||0;
      if(cv<pv&&cv>0)msgs.push(`⚠ "${SM[csk.id]?.name||csk.id}" (${cv}) < Lvl ${prev.level} (${pv})`);
    });
  }
  const active=skillRows.filter(s=>s.id&&s.id!=='none');
  if(active.length>3)msgs.push(`⚠ ${active.length} skills — only 3 visible on card`);
  const fid=cardFactionId();
  active.forEach(sk=>{
    const lvl=loreLevelForSkill(sk.id,fid),sn=SM[sk.id]?.name||sk.id,fn=cardFactionName();
    if(lvl==='never')msgs.push(`🚫 Lore: "${sn}" never on ${fn}`);
    else if(lvl==='warn')msgs.push(`⚠ Lore: "${sn}" very rare on ${fn}`);
    if(sk.id==='rupture')msgs.push(`⚠ Rupture is hidden — only via Evolve Pierce→Rupture`);
    if(sk.id==='flying')msgs.push(`⚠ Flying: very rare skill!`);
    if(sk.id==='rush')msgs.push(`⚠ Rush: very rare skill!`);
  });
  return msgs;
}
function levelHasWarning(fi,li){
  if(li===0)return false;
  const f=fusionData[fi],lv=f.levels,prev=lv[li-1],cur=lv[li];
  if((cur.attack<prev.attack&&prev.attack>0)||(cur.health<prev.health&&prev.health>0))return true;
  for(let si=0;si<prev.skills.length;si++){
    const psk=prev.skills[si],csk=cur.skills[si];if(!csk||csk.id!==psk.id)continue;
    const pv=psk.x||psk.n||0,cv=csk.x||csk.n||0;if(cv<pv&&cv>0)return true;
  }
  return false;
}

function mkNum(val,cb,warnFn){
  const w=document.createElement('div');w.className='nh';
  const m=document.createElement('button');m.className='smb';m.textContent='−';
  const sp=document.createElement('input');
  sp.type='number';sp.className='smsp';sp.value=val;sp.min=0;
  sp.style.cssText='background:transparent;border:none;outline:none;width:28px;text-align:center;font-size:11px;font-weight:600;color:#e0e0e0;font-family:inherit;padding:0;-moz-appearance:textfield;';
  if(warnFn&&warnFn(val))sp.classList.add('warn-val');
  const p=document.createElement('button');p.className='smb';p.textContent='+';
  const update=(v)=>{v=Math.max(0,v);sp.value=v;if(warnFn)sp.classList.toggle('warn-val',warnFn(v));cb(v);};
  m.onclick=()=>update(parseInt(sp.value||0)-1);
  p.onclick=()=>update(parseInt(sp.value||0)+1);
  sp.onchange=()=>update(parseInt(sp.value||0));
  sp.oninput=()=>{sp.value=sp.value.replace(/[^0-9]/g,'');};
  sp.onkeydown=(e)=>{if(['e','E','+','-','.'].includes(e.key))e.preventDefault();};
  sp.style.setProperty('-webkit-appearance','none');
  w.append(m,sp,p);return w;
}

function renderSkillRow(i){
  const c=document.getElementById('skillsContainer'),sk=skillRows[i];
  const fid=cardFactionId();
  const lore=sk.id&&sk.id!=='none'?loreLevelForSkill(sk.id,fid):'ok';
  const div=document.createElement('div');
  div.className='skill-card'+(lore==='never'?' lore-never':lore==='warn'?' lore-rare':'');
  const top=document.createElement('div');top.className='skill-top';
  const sel=document.createElement('select');
  SKILLS.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;if(s.id===sk.id)o.selected=true;sel.appendChild(o);});
  sel.onchange=e=>{skillRows[i]={id:e.target.value};saveLevelSkills();buildSkillRows();sync();};
  const del=document.createElement('button');del.className='del-btn';del.innerHTML='✕';
  del.onclick=()=>{skillRows.splice(i,1);saveLevelSkills();buildSkillRows();sync();};
  top.append(sel,del);div.appendChild(top);
  if(lore==='never'){const b=document.createElement('div');b.style.cssText='font-size:9px;color:#f06040;margin-bottom:3px';b.textContent='🚫 Never on '+cardFactionName();div.appendChild(b);}
  else if(lore==='warn'){const b=document.createElement('div');b.style.cssText='font-size:9px;color:#f09040;margin-bottom:3px';b.textContent='⚠ Rare on '+cardFactionName();div.appendChild(b);}
  if(sk.id==='rupture'){const b=document.createElement('div');b.style.cssText='font-size:9px;color:#f09040;margin-bottom:3px';b.textContent='⚠ Hidden skill — only via Evolve Pierce→Rupture';div.appendChild(b);}
  const def=SM[sk.id];
  if(!def||sk.id==='none'){c.appendChild(div);return;}
  const a=def.a,triggers=TRIGGER_MAP[sk.id]||[],trigActive=!!sk.trigger,allActive=!!(sk.all),nAllXcl=N_ALL_XCL.has(sk.id);
  if(triggers.length>0){
    const tr=document.createElement('div');tr.className='trig-row';
    const tl=document.createElement('span');tl.className='trig-lbl';tl.textContent='Trigger:';tr.appendChild(tl);
    triggers.forEach(t=>{
      const b=document.createElement('button');b.className='trig-btn'+(sk.trigger===t?' on':'');b.textContent=t;
      b.onclick=()=>{skillRows[i].trigger=skillRows[i].trigger===t?null:t;saveLevelSkills();buildSkillRows();sync();};
      tr.appendChild(b);
    });
    div.appendChild(tr);
  }
  if(Object.keys(a).length){
    const row=document.createElement('div');row.className='skill-attrs';
    const prevSk=getPrevSkillVal(i);
    if(a.x){const px=prevSk&&prevSk.id===sk.id?(prevSk.x||0):null;row.appendChild(mkAW('Strength',mkNum(sk.x||0,v=>{skillRows[i].x=v;saveLevelSkills();sync();},px!==null?v=>v<px:null)));}
    if(a.n){const nDim=nAllXcl&&allActive;const pn=prevSk&&prevSk.id===sk.id?(prevSk.n||0):null;row.appendChild(mkAW('Count',mkNum(sk.n||0,v=>{skillRows[i].n=v;saveLevelSkills();sync();},pn!==null?v=>v<pn:null),nDim));}
    if(a.c){row.appendChild(mkAW('Cooldown',mkNum(sk.c||0,v=>{skillRows[i].c=v;saveLevelSkills();sync();}),trigActive));}
    if(a.all){const t=mkTog('Single','All',allActive,v=>{skillRows[i].all=v;if(v&&nAllXcl)skillRows[i].n=0;saveLevelSkills();buildSkillRows();sync();});row.appendChild(mkAW('Target',t));}
    if(a.y){const fn=cardFactionName();const t=mkTog('Any',fn,sk.y||0,v=>{skillRows[i].y=v;saveLevelSkills();sync();});row.appendChild(mkAW('Faction',t));}
    if(a.s){const ss=mkSS(sk.s||SKILL_OPTS[0].id,v=>{skillRows[i].s=v;saveLevelSkills();sync();});if(!sk.s)skillRows[i].s=SKILL_OPTS[0].id;row.appendChild(mkAW(sk.id==='evolve'?'From':'Skill',ss));}
    if(a.s2){const ss2=mkSS(sk.s2||SKILL_OPTS[0].id,v=>{skillRows[i].s2=v;saveLevelSkills();sync();});if(!sk.s2)skillRows[i].s2=SKILL_OPTS[0].id;row.appendChild(mkAW('To',ss2));}
    if(a.card_id)row.appendChild(mkAW('Card ID',mkNum(sk.card_id||0,v=>{skillRows[i].card_id=v;saveLevelSkills();sync();})));
    if(row.children.length)div.appendChild(row);
  }
  c.appendChild(div);
}

function skillLabel(sk){
  const def=SM[sk.id];let t=def?def.name:sk.id;
  if(sk.trigger)t=`[${sk.trigger}] `+t;
  if(sk.all)t+=' All';if(sk.y)t+=' '+cardFactionName();
  if(sk.s){const sd=SM[sk.s];t+=' '+(sd?sd.name:sk.s);}
  if(sk.s2){const sd2=SM[sk.s2];t+='→'+(sd2?sd2.name:sk.s2);}
  if(sk.x)t+=' '+sk.x;
  if(sk.n&&!sk.all)t+=' '+sk.n;
  if(sk.c&&!sk.trigger)t+=' every '+sk.c;
  if(sk.card_id)t+=' ['+sk.card_id+']';
  return t;
}

function skillToXml(sk,ind,fid){
  if(!sk.id||sk.id==='none')return'';
  const def=SM[sk.id],a=def?def.a:{};
  let attrs='';
  if(sk.trigger)attrs+=` trigger="${sk.trigger}"`;
  attrs+=` id="${sk.id}"`;
  if(a.x&&sk.x)attrs+=` x="${sk.x}"`;
  if(a.n&&sk.n&&!sk.all)attrs+=` n="${sk.n}"`;
  if(a.y&&sk.y)attrs+=` y="${fid}"`;
  if(a.all&&sk.all)attrs+=` all="${sk.all}"`;
  if(a.c&&sk.c&&!sk.trigger)attrs+=` c="${sk.c}"`;
  if(a.s&&sk.s)attrs+=` s="${sk.s}"`;
  if(a.s2&&sk.s2)attrs+=` s2="${sk.s2}"`;
  if(a.card_id&&sk.card_id!==undefined&&sk.card_id!==0)attrs+=` card_id="${sk.card_id}"`;
  return`${ind}<skill${attrs} />\n`;
}

function buildXml(){
  const pic=uploadedFilename?uploadedFilename.replace(/\.[^.]+$/,''):'';
  let xml='';
  fusionData.forEach((f,fi)=>{
    const imgName=pic||f.picture||'',fid=f.type,base=f.levels[0];
    const prevName=fi>0?fusionData[fi-1].name:null;
    xml+=`  <unit>\n    <id>${base.card_id||''}</id>\n    <name>${f.name||''}</name>\n`;
    if(prevName&&prevName.trim())xml+=`    <!-- ${prevName} -->\n`;
    if(imgName)xml+=`    <picture>${imgName}</picture>\n`;
    if(f.asset_bundle)xml+=`    <asset_bundle>${f.asset_bundle}</asset_bundle>\n`;
    if(f.fusion_level>0)xml+=`    <fusion_level>${f.fusion_level}</fusion_level>\n`;
    xml+=`    <rarity>${sharedRarity}</rarity>\n    <type>${f.type}</type>\n    <set>${f.set}</set>\n    <cost>${sharedCost}</cost>\n`;
    xml+=`    <health>${base.health}</health>\n    <attack>${base.attack}</attack>\n`;
    base.skills.filter(s=>s.id&&s.id!=='none').forEach(s=>xml+=skillToXml(s,'    ',fid));
    f.levels.slice(1).forEach(l=>{
      xml+=`    <upgrade>\n      <card_id>${l.card_id||''}</card_id>\n      <level>${l.level}</level>\n`;
      xml+=`      <health>${l.health}</health>\n      <attack>${l.attack}</attack>\n`;
      l.skills.filter(s=>s.id&&s.id!=='none').forEach(s=>xml+=skillToXml(s,'      ',fid));
      xml+=`    </upgrade>\n`;
    });
    xml+=`  </unit>\n`;if(fi<fusionData.length-1)xml+='\n';
  });
  return xml.trimEnd();
}

function copyXml(){navigator.clipboard.writeText(document.getElementById('xmlOut').textContent).catch(()=>{});}

function loadImg(e){
  const file=e.target.files[0];if(!file)return;
  uploadedFilename=file.name;
  const noExt=file.name.replace(/\.[^.]+$/,'').toLowerCase();
  const pn=document.getElementById('pictureName');pn.textContent=noExt;pn.style.color='#aaa';pn.style.fontStyle='normal';
  const ab=AB_MAP[noExt]||AB_MAP[file.name.replace(/\.[^.]+$/,'')]||'';
  if(ab){fusionData.forEach(f=>{f.asset_bundle=ab;f.picture=noExt;});}
  const r=new FileReader();
  r.onload=ev=>{uploadedImgSrc=ev.target.result;document.getElementById('cardArt').src=ev.target.result;document.getElementById('cardArt').style.display='block';document.getElementById('cardPh').style.display='none';sync();};
  r.readAsDataURL(file);
}

function resetAll(){
  if(!confirm('Reset everything and start a new blank card?'))return;
  fusionData=[makeEmptyFusion(0),makeEmptyFusion(1),makeEmptyFusion(2)];
  curFusion=0;curLevel=0;uploadedImgSrc=null;uploadedFilename='';
  sharedRarity=1;sharedCost=0;
  document.getElementById('cardArt').style.display='none';document.getElementById('cardPh').style.display='flex';
  const pn=document.getElementById('pictureName');pn.textContent='none';pn.style.color='#555';pn.style.fontStyle='italic';
  buildFusionTabs();buildLevelTabs();skillRows=[];loadCurrent();
}


// ── Card Unit Type ─────────────────────────────────────────────────────────
// 0 = Assault, 1 = Structure, 2 = Commander
let cardUnitType = 0;
let isDominionCard = false;

const CARD_TYPES = [{id:0,label:'Assault'},{id:1,label:'Structure'},{id:2,label:'Commander'}];

function buildCardTypeButtons() {
  const c = document.getElementById('cardTypeButtons');
  if(!c) return;
  c.innerHTML = '';
  CARD_TYPES.forEach(ct => {
    const b = document.createElement('button');
    b.className = 'tab' + (cardUnitType === ct.id ? ' active' : '');
    b.textContent = ct.label;
    b.style.cssText = 'font-size:11px;padding:2px 10px';
    b.onclick = () => {
      cardUnitType = ct.id;
      buildCardTypeButtons();
      // Structure: force attack to 0 and disable
      if(cardUnitType === 1) {
        gf().levels.forEach(l => l.attack = 0);
        gl().attack = 0;
        document.getElementById('fAtk').textContent = '0';
      }
      // Dominion checkbox only for Structure
      const db = document.getElementById('dominionBox');
      if(db) db.style.display = cardUnitType === 1 ? 'flex' : 'none';
      updateAtkRowState();
      sync();
    };
    c.appendChild(b);
  });
  // Sync dominion box visibility
  const db = document.getElementById('dominionBox');
  if(db) db.style.display = cardUnitType === 1 ? 'flex' : 'none';
}

function saveDominion() {
  const cb = document.getElementById('isDominion');
  isDominionCard = cb ? cb.checked : false;
  // TODO: Dominion structure logic (more later)
  sync();
}

function updateAtkRowState() {
  const row = document.getElementById('atkRow');
  if(row) row.classList.toggle('dimmed', cardUnitType === 1);
}

// ── Copy skills to all levels (current fusion) ─────────────────────────────
function copySkillsToAllLevels() {
  const skills = JSON.parse(JSON.stringify(skillRows));
  if(!skills.length || skills.every(s => !s.id || s.id === 'none')) {
    alert('No skills on current level to copy.');
    return;
  }
  const f = gf();
  f.levels.forEach(l => { l.skills = JSON.parse(JSON.stringify(skills)); });
  saveLevelSkills();
  buildLevelTabs();
  sync();
}

buildFusionTabs();buildLevelTabs();skillRows=[];syncSharedToAll();buildCardTypeButtons();loadCurrent();

</script>
